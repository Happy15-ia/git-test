<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--Connexion des pages-->
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="carre">
        <!--ENTETE-->
        <div class="Entete">
            <div class="cadre">
                <img src="./images/logo.svg" alt="Logo">
            </div>
            <div class="Eclairage">
                <button style="background-color: black; border-radius: 10px;">
                    <img src="./images/icon-sun.svg" alt="sun">
                </button>
            </div>
        </div>
        <br>
        <br>
        <!--Sous titre-->
        <div class="Sous-titre">
            <div><h2 style="color: white;">Extensions List</h2></div>
            <!--Choix -->
            <div class="filtres">
                <button class="filtre actif" id="all">All</button>
                <button class="filtre " id="active">Active</button>
                <button class="filtre" id="inactive">Inactive</button>
            </div>
        </div>
        <!--Creer le case des differentes cartes-->
        <div class="Grille" id="grille"></div>
    </div>
</body>
</html>
